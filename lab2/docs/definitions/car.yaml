components:
  schemas:
    CarClass:
      type: string
      enum: [economy, compact, midsize, fullsize, luxury, suv, van]

    CarBase:
      type: object
      additionalProperties: false
      required:
        - vin
        - brand
        - model
        - year
        - car_class
        - license_plate
        - daily_rate
      properties:
        vin:
          type: string
          pattern: '^[A-HJ-NPR-Z0-9]{17}$'
        brand:
          type: string
          minLength: 1
          maxLength: 50
        model:
          type: string
          minLength: 1
          maxLength: 50
        year:
          type: integer
          minimum: 1900
          maximum: 2030
        car_class:
          $ref: '#/components/schemas/CarClass'
        license_plate:
          type: string
        daily_rate:
          type: number
          minimum: 0

    Car:
      allOf:
        - $ref: '#/components/schemas/CarBase'
        - type: object
          required: [id, available, created_at]
          properties:
            id:
              $ref: 'common.yaml#/components/schemas/UUID'
            available:
              type: boolean
              default: true
            created_at:
              $ref: 'common.yaml#/components/schemas/DateTime'

    CreateCarRequest:
      $ref: '#/components/schemas/CarBase'

    CarListResponse:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Car'
        total:
          type: integer
